strategy:
  name: btc_1h_mean_reversion_v2
  type: lgbm_regressor
  symbol: BTCUSDT
  timeframe: 1h

params:
  model_path: strategies/btc_1h_mean_reversion_v2/models/latest.txt
  feature_names_path: strategies/btc_1h_mean_reversion_v2/models/feature_names.json
  models_dir: strategies/btc_1h_mean_reversion_v2/models

  # 회귀 모드
  mode: regressor
  forward_period: 24
  barrier_atr_mult: 3.0

  # 시그널 파라미터
  min_pred_threshold: 0.001
  max_position_scale: 2.0
  pred_demean_window: 720

  # 동적 SL/TP (평균회귀: SL 여유, TP 보수적)
  sl_atr_mult: 3.0
  tp_atr_mult: 2.0
  min_sl_pct: 0.01
  max_sl_pct: 0.05
  min_tp_pct: 0.01
  max_tp_pct: 0.08

  max_holding_period: 24

  # 앙상블: Fold 4 (IC=0.121) + Fold 9 (IC=0.113) — PV 기간 7개월
  ensemble_folds: [4, 9]

  # 펀딩비 필터 (회귀 모드에서는 비활성화)
  funding_filter:
    enabled: false
    zscore_thresholds:
      - {zscore_below: 0, confidence: 0.0008}
      - {zscore_below: 2, confidence: 0.001}

  # OI 필터
  oi_filter:
    enabled: true
    block_zscore: 1.0

retrain:
  enabled: true
  interval_days: 30
  window_type: expanding
  window_months: 15
  min_pf_ratio: 0.9
  auto_ensemble: true
  ensemble_n_folds: 2
  use_optuna: false

execution:
  order_type: limit
  limit_offset: 0.001
  fee_rate: 0.00055

risk:
  max_position_pct: 0.20
  min_position_pct: 0.05
  stop_loss_pct: 0.021
  take_profit_pct: 0.020
