strategy:
  name: btc_1h_momentum
  symbol: BTCUSDT
  timeframe: 1h

params:
  model_path: strategies/btc_1h_momentum/models/latest.txt
  feature_names_path: strategies/btc_1h_momentum/models/feature_names.json
  confidence_threshold: 0.44
  upper_barrier_multiplier: 3.0
  lower_barrier_multiplier: 3.0
  max_holding_period: 24
  ensemble_folds: [11, 13]
  models_dir: strategies/btc_1h_momentum/models
  funding_filter:
    enabled: true
    zscore_thresholds:
      - {zscore_below: 0, confidence: 0.42}
      - {zscore_below: 2, confidence: 0.44}
      # zscore >= 2 이면 진입 차단

retrain:
  enabled: true
  interval_days: 30
  window_type: sliding
  window_months: 15
  min_pf_ratio: 0.9
  auto_ensemble: true
  ensemble_n_folds: 2
  use_optuna: false

execution:
  order_type: limit
  limit_offset: 0.001
  fee_rate: 0.00055

risk:
  max_position_pct: 0.20
  stop_loss_pct: 0.021
  take_profit_pct: 0.021
