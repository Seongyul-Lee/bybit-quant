strategy:
  name: btc_1h_mean_reversion_short
  type: lgbm_short_classifier
  symbol: BTCUSDT
  timeframe: 1h

params:
  model_path: strategies/btc_1h_mean_reversion_short/models/latest.txt
  feature_names_path: strategies/btc_1h_mean_reversion_short/models/feature_names.json
  confidence_threshold: 0.44
  upper_barrier_multiplier: 3.0     # 숏의 SL (가격 상승 배리어)
  lower_barrier_multiplier: 2.5     # 숏의 TP (가격 하락 배리어, 롱 MR의 profit과 동일)
  max_holding_period: 24
  models_dir: strategies/btc_1h_mean_reversion_short/models

  # 숏 전용 라벨러
  labeler_type: short_triple_barrier

  ensemble_folds: [8, 13]

  # 펀딩비 필터 (숏: 방향 반전)
  funding_filter:
    enabled: true
    zscore_thresholds:
      - {zscore_below: 0, confidence: 0.44}
      - {zscore_below: 2, confidence: 0.42}

  # OI 필터 (숏에서도 과밀 포지션 구간 차단)
  oi_filter:
    enabled: true
    block_zscore: 1.0

retrain:
  enabled: true
  interval_days: 30
  window_type: expanding
  window_months: 15
  min_pf_ratio: 0.9
  auto_ensemble: false
  ensemble_n_folds: 1
  use_optuna: false

execution:
  order_type: limit
  limit_offset: 0.001
  fee_rate: 0.00055

risk:
  max_position_pct: 0.15
  stop_loss_pct: 0.021
  take_profit_pct: 0.020
