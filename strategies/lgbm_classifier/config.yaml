strategy:
  name: LGBMClassifierStrategy
  symbol: BTCUSDT
  timeframe: 1h

params:
  model_path: strategies/lgbm_classifier/models/latest.txt
  feature_names_path: strategies/lgbm_classifier/models/feature_names.json
  confidence_threshold: 0.48
  upper_barrier_multiplier: 1.8
  lower_barrier_multiplier: 1.8
  max_holding_period: 16
  ensemble_folds: [10, 11, 13]
  models_dir: strategies/lgbm_classifier/models

execution:
  order_type: limit
  limit_offset: 0.001
  fee_rate: 0.00055

risk:
  max_position_pct: 0.05
  stop_loss_pct: 0.015
  take_profit_pct: 0.015
